name: Release macOS (unsigned)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64

    runs-on: macos-latest

    env:
      # Ad-hoc signing only — no Apple Developer certificate / notarization
      APPLE_SIGNING_IDENTITY: "-"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and publish (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: MD Editor v__VERSION__
          releaseBody: |
            Unsigned macOS release (arm64 + x64).

            - Built with ad-hoc signing (`signingIdentity: "-"`)
            - Not notarized — first launch: right-click → Open, or allow in Privacy & Security
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
