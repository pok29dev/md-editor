name: Build macOS

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS universal (unsigned)
    runs-on: macos-latest

    env:
      APPLE_SIGNING_IDENTITY: "-"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify frontend build
        run: npm run build

      - name: Sync bundle version (4-part)
        run: node scripts/sync-tauri-bundle-version.mjs

      - name: Build Tauri app (unsigned)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target universal-apple-darwin --config src-tauri/tauri.release.conf.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: md-editor-macos-universal
          path: |
            src-tauri/target/universal-apple-darwin/release/bundle/macos/
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/
          if-no-files-found: warn
